name: Release

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'
  # Manual release
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BATS-BDD v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build Binaries
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: bats-bdd-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: bats-bdd-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: bats-bdd-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        run: cp target/${{ matrix.target }}/release/bats-bdd ${{ matrix.name }}

      - name: Create archive
        run: tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          repository: Fguedes90/homebrew-tap
          path: homebrew-tap

      - uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Update Homebrew formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd homebrew-tap
          cp ../main-repo/packaging/homebrew/bats-bdd.rb Formula/bats-bdd.rb

          # Calculate checksums from GitHub releases
          LINUX_SHA=$(curl -sL "https://github.com/Fguedes90/bats-bdd/releases/download/v${VERSION}/bats-bdd-linux-x86_64.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          MACOS_X86_SHA=$(curl -sL "https://github.com/Fguedes90/bats-bdd/releases/download/v${VERSION}/bats-bdd-macos-x86_64.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          MACOS_ARM_SHA=$(curl -sL "https://github.com/Fguedes90/bats-bdd/releases/download/v${VERSION}/bats-bdd-macos-aarch64.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          # Replace placeholders - use unique markers per architecture
          sed -i "s/LINUX_SHA_PLACEHOLDER/${LINUX_SHA}/g" Formula/bats-bdd.rb
          sed -i "s/MACOS_X86_SHA_PLACEHOLDER/${MACOS_X86_SHA}/g" Formula/bats-bdd.rb
          sed -i "s/MACOS_ARM_SHA_PLACEHOLDER/${MACOS_ARM_SHA}/g" Formula/bats-bdd.rb
          sed -i "s/vVERSION/v${VERSION}/g" Formula/bats-bdd.rb
          sed -i "s/VERSION/${VERSION}/g" Formula/bats-bdd.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bats-bdd.rb
          git commit -m "Update bats-bdd to v${VERSION}"
          git push

          echo "✅ Homebrew formula updated to v${VERSION}"